name               = "payment-bot"
main               = "src/index.ts"
compatibility_date = "2026-04-26"
compatibility_flags = ["nodejs_compat"]

# Secrets — set via: wrangler secret put <NAME>
#   TELEGRAM_BOT_TOKEN   — from @BotFather
#   TELEGRAM_WEBHOOK_SECRET — secret_token Telegram echoes to webhook POSTs
#   AIRTABLE_TOKEN       — PAT with data.records:read + data.records:write
#   AUTHORIZED_USER_ID   — your Telegram numeric user ID (get from @userinfobot)

# Enables: wrangler tail (live log streaming)
# and CF Dashboard → payment-bot → Logs tab
[observability]
enabled = true

[vars]
AIRTABLE_BASE_ID = "app6He8xRaUzNBTDl"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "220ffe76ec364d6eaf8726ed01e6495b"

[[durable_objects.bindings]]
name = "PAYMENT_CONFIRM_LOCK"
class_name = "PaymentConfirmLock"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "PaymentConfirmLock" ]
